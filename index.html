<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Goedkoop tanken</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #050816;
      --bg-alt: #0b1020;
      --card-bg: #0f172a;
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.1);
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --danger: #f97373;
      --border: #1f2937;
      --radius: 10px;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
      --transition: 160ms ease-out;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: radial-gradient(circle at top, #1f2937 0, var(--bg) 40%, #020617 100%);
      color: var(--text);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .page-header h1 {
      margin: 0 0 4px;
      font-size: 1.9rem;
      letter-spacing: 0.02em;
    }

    .page-header p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .controls {
      margin-top: 18px;
      padding: 16px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(15,23,42,0.96), rgba(15,23,42,0.88));
      border: 1px solid rgba(148,163,184,0.14);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px 16px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.075em;
      color: var(--text-muted);
    }

    input,
    select {
      padding: 7px 9px;
      border-radius: 7px;
      border: 1px solid rgba(31,41,55,0.9);
      background: rgba(15,23,42,0.96);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    input:focus,
    select:focus {
      border-color: rgba(56,189,248,0.9);
      box-shadow: 0 0 0 1px rgba(56,189,248,0.55);
      background: rgba(15,23,42,1);
    }

    .buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.4);
      background: rgba(15,23,42,0.9);
      color: var(--text);
      font-size: 0.85rem;
      padding: 7px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }

    button:hover {
      background: rgba(31,41,55,0.96);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.35);
    }

    button.primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-color: rgba(34,197,94,0.4);
      color: #022c22;
      font-weight: 600;
      box-shadow: 0 12px 30px rgba(22,163,74,0.45);
    }

    button.primary:hover {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      box-shadow: 0 16px 36px rgba(34,197,94,0.6);
    }

    .selection-info,
    .status {
      grid-column: 1 / -1;
      font-size: 0.8rem;
    }

    .selection-info {
      color: var(--text-muted);
    }

    .status {
      color: var(--accent);
    }

    .status.status-error {
      color: var(--danger);
    }

    .results-section {
      margin-top: 22px;
    }

    .results-section h2 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.11em;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .station-card {
      border-radius: 12px;
      background: radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 45%),
                  radial-gradient(circle at bottom right, rgba(34,197,94,0.18), transparent 40%),
                  var(--card-bg);
      border: 1px solid rgba(30,64,175,0.4);
      box-shadow: var(--shadow);
      padding: 10px 12px 9px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      overflow: hidden;
    }

    .station-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid transparent;
      background: linear-gradient(120deg, rgba(56,189,248,0.7), rgba(34,197,94,0.7)) border-box;
      -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease-out;
    }

    .station-card:hover::before {
      opacity: 0.9;
    }

    .station-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .station-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .station-price {
      font-weight: 700;
      color: #bbf7d0;
      font-feature-settings: "tnum" 1, "lnum" 1;
    }

    .station-body {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .station-address {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .station-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .station-meta span {
      font-size: 0.78rem;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.35);
      color: var(--text-muted);
    }

    .station-meta span:nth-child(1) {
      border-color: rgba(56,189,248,0.7);
      background: rgba(15,23,42,0.95);
    }

    .station-meta span:nth-child(2) {
      border-color: rgba(34,197,94,0.7);
      background: var(--accent-soft);
      color: #bbf7d0;
    }

    .station-meta span:nth-child(3) {
      border-color: rgba(234,179,8,0.7);
    }

    @media (max-width: 640px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .buttons {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .station-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .station-price {
        margin-top: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>Goedkoop tanken</h1>
      <p>GitHub Pages frontend met live CARBU-data via Cloudflare Worker.</p>
    </header>

    <section class="controls">
      <div class="field">
        <label for="locationInput">Locatie</label>
        <input id="locationInput" type="text" placeholder="Korte Bremstraat Merksem" value="korte bremstraat merksem">
      </div>

      <div class="field">
        <label for="fuelSelect">Brandstof</label>
        <select id="fuelSelect">
          <option value="Super 95 (E10)">Super 95 (E10)</option>
          <option value="Diesel (B7)">Diesel (B7)</option>
          <option value="Super 98 (E5)">Super 98 (E5)</option>
        </select>
      </div>

      <div class="field">
        <label for="toleranceSelect">Prijsverschil</label>
        <select id="toleranceSelect">
          <option value="0.01">1 cent</option>
          <option value="0.02">2 cent</option>
          <option value="0.03" selected>3 cent</option>
          <option value="0.05">5 cent</option>
        </select>
      </div>

      <div class="field">
        <label for="sortSelect">Sorteren</label>
        <select id="sortSelect">
          <option value="price" selected>Prijs laag-hoog</option>
          <option value="distance">Afstand kort-lang</option>
        </select>
      </div>

      <div class="buttons">
        <button id="useLocationBtn" type="button">Gebruik mijn locatie</button>
        <button id="searchBtn" type="button" class="primary">Zoek</button>
      </div>

      <div id="selectionInfo" class="selection-info"></div>
      <div id="status" class="status"></div>
    </section>

    <section class="results-section">
      <h2>Resultaten</h2>
      <div id="results" class="results"></div>
    </section>
  </div>

  <script>
    // === CONFIG ===
    const WORKER_URL = 'https://carbu-worker.bjorn-broeckx.workers.dev';

    // === DOM ELEMENTS ===
    const locationInput = document.getElementById('locationInput');
    const fuelSelect = document.getElementById('fuelSelect');
    const toleranceSelect = document.getElementById('toleranceSelect');
    const sortSelect = document.getElementById('sortSelect');
    const useLocationBtn = document.getElementById('useLocationBtn');
    const searchBtn = document.getElementById('searchBtn');
    const selectionInfo = document.getElementById('selectionInfo');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    // === STATE ===
    let originLat = null;
    let originLon = null;
    let currentStations = [];

    // === UTIL ===
    function setStatus(msg, type = 'info') {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type === 'error' ? ' status-error' : '');
    }

    function toRad(value) {
      return value * Math.PI / 180;
    }

    function haversineDistanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function addDistances(stations, lat, lon) {
      if (lat == null || lon == null) {
        stations.forEach(s => (s.distanceKm = null));
        return;
      }
      stations.forEach(station => {
        if (station.lat != null && station.lon != null) {
          station.distanceKm = haversineDistanceKm(lat, lon, station.lat, station.lon);
        } else {
          station.distanceKm = null;
        }
      });
    }

    // === PARSER VOOR JE WORKER-RESP ===
    // Worker geeft JSON: { ok, fuel, html, ... } [page:1]
    function parseStationsFromWorkerJson(data, selectedFuelLabel) {
      const html = data.html || '';
      const doc = new DOMParser().parseFromString(html, 'text/html');

      // Elke stationItem panel panel-default blok = één station [page:1]
      const stationCards = Array.from(
        doc.querySelectorAll('.stationItem.panel.panel-default')
      );

      const stations = [];

      stationCards.forEach(card => {
        const text = card.innerText.replace(/\s+/g, ' ').trim();

        // Naam tussen ** ... **
        const nameMatch = text.match(/\*\*\s*(.+?)\s*\*\*/);
        const name = nameMatch ? nameMatch[1].trim() : 'Onbekend station';

        // Adres: "83 Paleisstraat 2000 Antwerpen" -> nummer+straat + postcode+stad
        const addressMatch = text.match(/(\d+\s+[^\d]+?)\s+(\d{4}\s+[A-Za-zÀ-ÿ ]+)/);
        const address = addressMatch ? (addressMatch[1] + ', ' + addressMatch[2]).trim() : '';

        // Brandstof + prijs, bv. "Super 95 (E10) 1,813 €/L"
        const escapedFuel = selectedFuelLabel.replace(/[()]/g, '\\$&');
        const fuelRegex = new RegExp(escapedFuel + '\\s+([0-9],[0-9]{3})\\s*€/L');
        const fuelMatch = text.match(fuelRegex);
        const price = fuelMatch ? parseFloat(fuelMatch[1].replace(',', '.')) : null;

        // Tankkaart-informatie staat niet duidelijk in deze HTML; voorlopig false
        const hasFuelCard = false;

        // GPS: "GPS 51.206143,4.398287"
        const gpsMatch = text.match(/GPS[^0-9]*([0-9]+\.[0-9]+)\s*,\s*([0-9]+\.[0-9]+)/i);
        const lat = gpsMatch ? parseFloat(gpsMatch[1]) : null;
        const lon = gpsMatch ? parseFloat(gpsMatch[2]) : null;

        stations.push({
          name,
          address,
          fuel: selectedFuelLabel,
          price,
          hasFuelCard,
          lat,
          lon,
          distanceKm: null
        });
      });

      return stations;
    }

    // === RENDER ===
    function renderStations(stations) {
      resultsEl.innerHTML = '';

      if (!stations.length) {
        resultsEl.innerHTML = '<p class="selection-info">Geen resultaten gevonden.</p>';
        return;
      }

      const sortBy = sortSelect.value;
      const sorted = [...stations].sort((a, b) => {
        if (sortBy === 'distance') {
          if (a.distanceKm == null) return 1;
          if (b.distanceKm == null) return -1;
          return a.distanceKm - b.distanceKm;
        }
        if (a.price == null) return 1;
        if (b.price == null) return -1;
        return a.price - b.price;
      });

      sorted.forEach(station => {
        const card = document.createElement('div');
        card.className = 'station-card';

        const distanceText = station.distanceKm != null
          ? station.distanceKm.toFixed(1) + ' km'
          : 'Onbekende afstand';

        const priceText = station.price != null
          ? '€ ' + station.price.toFixed(3) + '/L'
          : '-';

        card.innerHTML = `
          <div class="station-header">
            <div class="station-title">${station.name}</div>
            <div class="station-price">${priceText}</div>
          </div>
          <div class="station-body">
            <div class="station-address">${station.address}</div>
            <div class="station-meta">
              <span>${station.fuel}</span>
              <span>${distanceText}</span>
              <span>Tankkaart: ${station.hasFuelCard ? 'Ja' : 'Nee'}</span>
            </div>
          </div>
        `;

        resultsEl.appendChild(card);
      });
    }

    // === GEOLOCATIE / GEOCODING (optioneel uit te breiden) ===
    async function geocodeLocation(query) {
      // Later kun je hier Nominatim of een andere service via je Worker aanroepen [web:35][web:158]
      return null;
    }

    // === MAIN FLOW ===
    async function zoekStations() {
      const locationText = locationInput.value.trim();
      const fuelLabel = fuelSelect.value;
      const tolerance = parseFloat(toleranceSelect.value);

      setStatus('Resultaten laden…');

      if (locationText && (originLat == null || originLon == null)) {
        const geo = await geocodeLocation(locationText);
        if (geo) {
          originLat = geo.lat;
          originLon = geo.lon;
        }
      }

      try {
        const url = `${WORKER_URL}?fuel=${encodeURIComponent(fuelLabel)}&tolerance=${tolerance}`;
        const resp = await fetch(url);
        if (!resp.ok) {
          throw new Error('Worker gaf een fout terug');
        }

        const data = await resp.json(); // Worker antwoordt met JSON [page:1]
        if (!data.ok) {
          throw new Error('Worker-resultaat is niet ok');
        }

        const stations = parseStationsFromWorkerJson(data, fuelLabel);
        addDistances(stations, originLat, originLon);
        currentStations = stations;

        const cheapest = stations
          .filter(s => s.price != null)
          .sort((a, b) => a.price - b.price)[0];

        if (cheapest) {
          selectionInfo.textContent =
            `Aantal resultaten: ${stations.length}, goedkoopste: € ${cheapest.price.toFixed(3)}/L.`;
        } else {
          selectionInfo.textContent = `Aantal resultaten: ${stations.length}.`;
        }

        renderStations(stations);
        setStatus('Resultaten bijgewerkt.');
      } catch (err) {
        console.error(err);
        setStatus('Fout bij laden van resultaten.', 'error');
      }
    }

    // === EVENT HANDLERS ===
    searchBtn.addEventListener('click', () => {
      zoekStations();
    });

    sortSelect.addEventListener('change', () => {
      if (currentStations.length) {
        renderStations(currentStations);
      }
    });

    useLocationBtn.addEventListener('click', () => {
      if (!navigator.geolocation) {
        setStatus('Geolocatie wordt niet ondersteund door deze browser.', 'error');
        return;
      }
      setStatus('Bepalen van huidige locatie…');
      navigator.geolocation.getCurrentPosition(
        pos => {
          originLat = pos.coords.latitude;
          originLon = pos.coords.longitude;
          setStatus('Locatie ingesteld. Zoek opnieuw om afstanden te zien.');
        },
        err => {
          console.error(err);
          setStatus('Kon huidige locatie niet ophalen.', 'error');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    // optioneel: auto-zoek bij eerste load
    // window.addEventListener('load', () => zoekStations());
  </script>
</body>
</html>
